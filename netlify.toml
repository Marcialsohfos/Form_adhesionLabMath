[build]
  command = "npm install && node build.js"
  functions = "netlify/functions"
  publish = "."

[dev]
  functions = "netlify/functions"
  publish = "."

# Exclure les fichiers de configuration du déploiement des fonctions
[functions]
  included_files = ["!netlify/functions/supabase-config.example.js"]

[[redirects]]
  from = "/"
  to = "/membership.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin-memberships.html"
  status = 200

[[redirects]]
  from = "/admin-memberships"
  to = "/admin-memberships.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/membership.html"
  status = 404